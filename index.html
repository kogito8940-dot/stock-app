<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>在庫管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f0f0f0;
  --primary:#1a73e8;--primary-dark:#1557b0;
  --success:#34a853;--warning:#f9ab00;--danger:#ea4335;
  --text:#202124;--text2:#5f6368;--text3:#9aa0a6;
  --border:#dadce0;--radius:14px;
}
html,body{height:100%;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;color:var(--text);background:var(--bg);display:flex;flex-direction:column;}
@media(min-width:600px){
  body{background:#444;align-items:center;justify-content:flex-start;padding:20px 0;}
  .app-shell{width:390px;height:844px;border-radius:44px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.6);}
}
@media(max-width:599px){.app-shell{flex:1;width:100%;}}
.app-shell{background:var(--bg);display:flex;flex-direction:column;position:relative;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.header-title{font-size:17px;font-weight:700;flex:1;color:var(--text)}
.header-badge{font-size:11px;color:#fff;padding:4px 10px;border-radius:20px;font-weight:600}
.back-btn{background:none;border:none;font-size:26px;cursor:pointer;color:var(--primary);padding:2px 6px 2px 0;line-height:1;font-weight:300}
.session-bar{background:var(--primary);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;font-size:12px;flex-shrink:0;}
.session-info{display:flex;gap:8px;flex-wrap:wrap}
.session-tag{background:rgba(255,255,255,.22);padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500}
.session-change{font-size:11px;text-decoration:underline;cursor:pointer;opacity:.85;white-space:nowrap}
.main{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px;}
.screen{display:none}.screen.active{display:block}
.bnav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);position:sticky;bottom:0;z-index:50;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 10px;font-size:10px;color:var(--text3);cursor:pointer;gap:2px;}
.bnav-item.active{color:var(--primary)}
.bnav-icon{font-size:24px;line-height:1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:28px 20px;padding-bottom:calc(28px + env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:20px;font-weight:700;margin-bottom:20px;color:var(--text)}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}
.form-select,.form-input{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;font-size:16px;appearance:none;background:var(--surface);color:var(--text);outline:none;}
.form-select:focus,.form-input:focus{border-color:var(--primary)}
.form-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px;}
.form-btn:active{background:var(--primary-dark)}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.summary-box{background:var(--surface);border-radius:var(--radius);padding:14px 8px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.summary-num{font-size:26px;font-weight:700;color:var(--primary);line-height:1.1}
.summary-label{font-size:10px;color:var(--text2);margin-top:4px;font-weight:500}
.tile-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tile{background:var(--surface);border-radius:var(--radius);padding:20px 12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;transition:transform .1s}
.tile:active{transform:scale(.96)}
.tile-icon{font-size:32px;margin-bottom:8px;line-height:1}
.tile-label{font-size:14px;font-weight:600;color:var(--text)}
.alert-card{background:#fffbea;border:1.5px solid #f9ab00;border-radius:var(--radius);padding:12px 14px;margin-bottom:14px}
.alert-title{font-size:13px;font-weight:700;color:#b06000;margin-bottom:4px}
.alert-item{font-size:12px;color:#7a4500;padding:2px 0}
.scan-area{background:linear-gradient(160deg,#1a1a2e,#16213e);border-radius:var(--radius);height:175px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;cursor:pointer;margin-bottom:14px;position:relative;overflow:hidden}
.scan-corner{position:absolute;width:24px;height:24px;border-color:#4fc3f7;border-style:solid;border-width:0}
.scan-corner.tl{top:16px;left:16px;border-top-width:3px;border-left-width:3px;border-radius:4px 0 0 0}
.scan-corner.tr{top:16px;right:16px;border-top-width:3px;border-right-width:3px;border-radius:0 4px 0 0}
.scan-corner.bl{bottom:16px;left:16px;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 4px}
.scan-corner.br{bottom:16px;right:16px;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 4px 0}
.scan-icon{font-size:36px;margin-bottom:6px;opacity:.9}
.scan-text{font-size:14px;font-weight:600;}
.scan-sub{font-size:11px;opacity:.6;margin-top:4px}
.scan-line{position:absolute;width:75%;height:2px;background:linear-gradient(90deg,transparent,#4fc3f7,transparent);animation:scanAnim 2s ease-in-out infinite}
@keyframes scanAnim{0%{top:20%}50%{top:78%}100%{top:20%}}
.or-divider{text-align:center;color:var(--text3);font-size:12px;margin:12px 0;display:flex;align-items:center;gap:10px}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.list-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .1s}
.list-item:active{background:#f8f9ff;}
.list-item-name{font-size:17px;font-weight:700;color:var(--text)}
.list-item-arrow{color:var(--text3);font-size:20px;flex-shrink:0}
.badge{display:inline-block;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700}
.badge-ok{background:#e6f4ea;color:#137333}
.badge-warn{background:#fef7e0;color:#7a4500}
.badge-ng{background:#fce8e6;color:#c5221f}
.badge-done{background:#e8f0fe;color:#1a73e8}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:16px;color:var(--text2);margin-bottom:14px;flex-wrap:wrap}
.breadcrumb-item{cursor:pointer;color:var(--primary);font-weight:700}
.breadcrumb-sep{color:var(--text3);font-weight:400}
.product-confirm{background:#f0f6ff;border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;border:2px solid var(--primary)}
.product-name{font-size:16px;font-weight:700;color:var(--text)}
.product-sku{font-size:11px;color:var(--text2);margin-top:3px;font-family:monospace}
.product-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.product-meta-item{background:rgba(26,115,232,.1);color:var(--primary);padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600}
.qty-display{background:var(--surface);border-radius:14px;padding:14px;text-align:center;margin-bottom:12px;border:1.5px solid var(--border)}
.qty-num{font-size:52px;font-weight:700;color:var(--text);letter-spacing:2px;line-height:1}
.qty-unit{font-size:16px;color:var(--text2);margin-left:8px;font-weight:500}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.numpad-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px;font-size:24px;font-weight:500;cursor:pointer;text-align:center;user-select:none;color:var(--text);}
.numpad-btn:active{background:#e8f0fe;border-color:var(--primary)}
.numpad-btn.del{font-size:20px;color:var(--danger)}
.numpad-btn.zero{grid-column:span 2}
.record-btn{width:100%;color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.back-link{width:100%;background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;padding:8px;text-align:center;display:block}
.card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.history-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.history-item:last-child{border-bottom:none}
.history-badge{padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700;flex-shrink:0}
.history-badge.in{background:#e6f4ea;color:#137333}
.history-badge.out{background:#fce8e6;color:#c5221f}
.history-badge.move{background:#e8f0fe;color:#1a73e8}
.history-name{flex:1;font-size:12px;color:var(--text);font-weight:500}
.history-qty{font-size:14px;font-weight:700}
.history-qty.plus{color:var(--success)}
.history-qty.minus{color:var(--danger)}
.history-qty.move{color:var(--primary)}
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none}
.filter-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:7px 16px;font-size:12px;white-space:nowrap;cursor:pointer;flex-shrink:0;font-weight:500;color:var(--text2)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 22px;border-radius:12px;font-size:14px;font-weight:500;z-index:300;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1}
.hidden{display:none}
.loading{text-align:center;padding:48px;color:var(--text3);font-size:14px}
</style>
</head>
<body>
<div class="app-shell">

<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">作業設定</div>
    <div class="form-group">
      <label class="form-label">担当者名</label>
      <input id="inp-staff" class="form-input" type="text" placeholder="名前を入力">
    </div>
    <div class="form-group">
      <label class="form-label" id="warehouse-label">倉庫</label>
      <select id="sel-warehouse" class="form-select">
        <option>山科倉庫</option>
        <option>創造社倉庫</option>
        <option>事務所</option>
      </select>
    </div>
    <div class="form-group hidden" id="dest-group">
      <label class="form-label">移動先倉庫</label>
      <select id="sel-dest" class="form-select">
        <option>山科倉庫</option>
        <option>創造社倉庫</option>
        <option>事務所</option>
      </select>
    </div>
    <div class="form-group hidden" id="reason-group">
      <label class="form-label">出庫理由</label>
      <select id="sel-reason" class="form-select">
        <option>出庫（販売）</option>
        <option>出庫（使用）</option>
        <option>出庫（廃棄）</option>
      </select>
    </div>
    <button class="form-btn" id="modal-start-btn">作業開始</button>
  </div>
</div>

<div id="addMasterModal" class="modal-overlay">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="modal-title" style="margin-bottom:0">新規商品登録</div>
      <button onclick="closeAddMasterModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:var(--text3)">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ *</label>
      <select id="add-category" class="form-select" onchange="updateSkuPreview()"></select>
    </div>
    <div class="form-group">
      <label class="form-label">商品名 *</label>
      <input id="add-name" class="form-input" type="text" placeholder="例: AC100 Base" oninput="updateSkuPreview()">
    </div>
    <div class="form-group">
      <label class="form-label">サイズ *</label>
      <input id="add-size" class="form-input" type="text" placeholder="例: 25kg" oninput="updateSkuPreview()">
    </div>
    <div style="display:flex;gap:8px">
      <div class="form-group" style="flex:1">
        <label class="form-label">単位 *</label>
        <select id="add-unit" class="form-select">
          <option>袋</option><option>缶</option><option>個</option>
          <option>本</option><option>枚</option><option>kg</option><option>L</option>
        </select>
      </div>
      <div class="form-group" style="flex:1">
        <label class="form-label">商品区分 *</label>
        <select id="add-type" class="form-select">
          <option>輸入品</option><option>小分け品</option><option>副資材</option><option>仕入品</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <div class="form-group" style="flex:1">
        <label class="form-label">最低在庫数</label>
        <input id="add-minstock" class="form-input" type="number" value="0" min="0">
      </div>
      <div class="form-group" style="flex:1">
        <label class="form-label">バーコード</label>
        <select id="add-barcode" class="form-select">
          <option>QR</option><option>JAN</option><option>なし</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">備考</label>
      <input id="add-note" class="form-input" type="text" placeholder="任意">
    </div>
    <div style="background:#f0f6ff;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--text2)">
      生成されるSKU_ID：<br>
      <span id="sku-preview" style="font-family:monospace;font-weight:700;color:var(--primary);font-size:13px"></span>
    </div>
    <button class="form-btn" id="add-master-btn" onclick="submitAddMaster()">登録する</button>
  </div>
</div>

<div id="toggleMasterModal" class="modal-overlay">
  <div class="modal" style="border-radius:24px;max-width:320px;margin:auto;padding:24px 20px">
    <div class="modal-title" id="toggle-title"></div>
    <p id="toggle-body" style="font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.6"></p>
    <div style="display:flex;gap:10px">
      <button onclick="closeToggleMasterModal()" style="flex:1;padding:13px;border:1.5px solid var(--border);background:#fff;border-radius:12px;font-size:14px;cursor:pointer">キャンセル</button>
      <button id="toggle-confirm-btn" onclick="confirmToggleMaster()" style="flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;color:#fff"></button>
    </div>
  </div>
</div>

<div class="header">
  <button class="back-btn hidden" id="back-btn" onclick="goBack()">‹</button>
  <div class="header-title" id="header-title">在庫管理</div>
  <span class="header-badge hidden" id="header-sub"></span>
</div>

<div class="session-bar hidden" id="session-bar">
  <div class="session-info">
    <span class="session-tag" id="sb-warehouse"></span>
    <span class="session-tag hidden" id="sb-dest"></span>
    <span class="session-tag" id="sb-staff"></span>
  </div>
  <span class="session-change" onclick="openModal()">変更</span>
</div>

<div class="main">
  <div id="screen-home" class="screen active">
    <div id="alert-area"></div>
    <div class="summary-grid">
      <div class="summary-box"><div class="summary-num" id="sum-sku">-</div><div class="summary-label">総SKU数</div></div>
      <div class="summary-box"><div class="summary-num" id="sum-reorder" style="color:var(--warning)">-</div><div class="summary-label">要補充</div></div>
      <div class="summary-box"><div class="summary-num" id="sum-out" style="color:var(--danger)">-</div><div class="summary-label">欠品</div></div>
    </div>
    <div class="tile-grid">
      <div class="tile" onclick="startOperation('入庫')"><div class="tile-icon">📦</div><div class="tile-label">入庫</div></div>
      <div class="tile" onclick="startOperation('出庫')"><div class="tile-icon">🚚</div><div class="tile-label">出庫</div></div>
      <div class="tile" onclick="startOperation('移動')"><div class="tile-icon">🔄</div><div class="tile-label">倉庫間移動</div></div>
      <div class="tile" onclick="showScreen('stock')"><div class="tile-icon">📊</div><div class="tile-label">在庫確認</div></div>
    </div>
  </div>

  <div id="screen-operation" class="screen">
    <div class="scan-area" onclick="startScan()">
      <div class="scan-corner tl"></div>
      <div class="scan-corner tr"></div>
      <div class="scan-corner bl"></div>
      <div class="scan-corner br"></div>
      <div class="scan-icon">▦</div>
      <div class="scan-text">バーコードをスキャン</div>
      <div class="scan-sub">タップしてカメラを起動</div>
      <div class="scan-line"></div>
    </div>
    <div class="or-divider">または</div>
    <button class="form-btn" style="margin-bottom:14px" onclick="showScreen('category')">手動で商品を選択</button>
    <div class="card">
      <div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px">この作業での記録</div>
      <div id="history-list"><div style="font-size:12px;color:var(--text3)">まだ記録がありません</div></div>
    </div>
  </div>

  <div id="screen-category" class="screen">
    <div class="breadcrumb"><span style="color:var(--text);font-weight:700;font-size:16px">カテゴリ</span></div>
    <div id="category-list"><div class="loading">読み込み中...</div></div>
  </div>

  <div id="screen-product" class="screen">
    <div class="breadcrumb">
      <span class="breadcrumb-item" onclick="showScreen('category')">カテゴリ</span>
      <span class="breadcrumb-sep">›</span>
      <span id="bc-category" style="color:var(--text);font-weight:700;font-size:16px"></span>
    </div>
    <div id="product-list"></div>
  </div>

  <div id="screen-size" class="screen">
    <div class="breadcrumb">
      <span class="breadcrumb-item" onclick="showScreen('category')">カテゴリ</span>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-item" onclick="showScreen('product')" id="bc-category2"></span>
      <span class="breadcrumb-sep">›</span>
      <span id="bc-product" style="color:var(--text);font-weight:700;font-size:16px"></span>
    </div>
    <div id="size-list"></div>
  </div>

  <div id="screen-qty" class="screen">
    <div id="product-confirm" class="product-confirm"></div>
    <div class="qty-display">
      <span class="qty-num" id="qty-display">0</span>
      <span class="qty-unit" id="qty-unit"></span>
    </div>
    <div class="numpad">
      <div class="numpad-btn" onclick="numInput('7')">7</div>
      <div class="numpad-btn" onclick="numInput('8')">8</div>
      <div class="numpad-btn" onclick="numInput('9')">9</div>
      <div class="numpad-btn" onclick="numInput('4')">4</div>
      <div class="numpad-btn" onclick="numInput('5')">5</div>
      <div class="numpad-btn" onclick="numInput('6')">6</div>
      <div class="numpad-btn" onclick="numInput('1')">1</div>
      <div class="numpad-btn" onclick="numInput('2')">2</div>
      <div class="numpad-btn" onclick="numInput('3')">3</div>
      <div class="numpad-btn zero" onclick="numInput('0')">0</div>
      <div class="numpad-btn del" onclick="numDel()">⌫</div>
    </div>
    <button class="record-btn" id="record-btn" onclick="recordLog()">記録する</button>
    <button class="back-link" onclick="goBack()">← 商品選択に戻る</button>
  </div>

  <div id="screen-stock" class="screen">
    <div class="filter-bar">
      <div class="filter-btn active" onclick="filterWarehouse('all',this)">すべて</div>
      <div class="filter-btn" onclick="filterWarehouse('山科倉庫',this)">山科倉庫</div>
      <div class="filter-btn" onclick="filterWarehouse('創造社倉庫',this)">創造社倉庫</div>
      <div class="filter-btn" onclick="filterWarehouse('事務所',this)">事務所</div>
    </div>
    <div id="stock-list"><div class="loading">読み込み中...</div></div>
  </div>

  <div id="screen-master" class="screen">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:15px;font-weight:700;color:var(--text2)">商品マスタ管理</div>
      <button onclick="openAddMasterModal()" style="background:var(--primary);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;">＋ 新規登録</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <select id="masterCatFilter" onchange="renderMasterList()" style="flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;background:var(--surface)">
        <option value="">全カテゴリ</option>
      </select>
      <input type="text" id="masterSearch" placeholder="商品名・SKU検索" oninput="renderMasterList()" style="flex:2;padding:9px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;">
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
      <input type="checkbox" id="masterShowInactive" onchange="renderMasterList()">
      <label for="masterShowInactive" style="font-size:13px;color:var(--text2)">廃番も表示する</label>
      <span id="masterCount" style="margin-left:auto;font-size:12px;color:var(--text3)"></span>
    </div>
    <div id="master-list"><div class="loading">読み込み中...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="bnav">
  <div class="bnav-item active" onclick="showScreen('home')" id="nav-home"><div class="bnav-icon">🏠</div>ホーム</div>
  <div class="bnav-item" onclick="startOperation('入庫')" id="nav-op"><div class="bnav-icon">📦</div>入出庫</div>
  <div class="bnav-item" onclick="showScreen('stock')" id="nav-stock"><div class="bnav-icon">📊</div>在庫確認</div>
  <div class="bnav-item" onclick="showScreen('master')" id="nav-master"><div class="bnav-icon">🗂️</div>マスタ</div>
</div>

</div>
<script>
const API='https://script.google.com/macros/s/AKfycbz2K9_frpjl7gXnl4jMcqSNIt4Yupx-SYcVJHiM6Wtb0gFsRlgmNLlBy06Xz7TnOPgx/exec';
let master=[],summary=[],session={warehouse:'',dest:'',staff:'',mode:'',reason:''},currentQty='',currentProduct=null,currentCategory='',currentProductName='',sessionHistory=[],recordedSizes=[],screenStack=[];

async function loadData(){
  try{
    const [m,s]=await Promise.all([
      fetch(API+'?action=getMaster').then(r=>r.json()),
      fetch(API+'?action=getSummary').then(r=>r.json())
    ]);
    master=m;summary=s;updateHome();
  }catch(e){showToast('データ読み込みエラー');}
}

window.onload=function(){
  document.getElementById('modal-start-btn').addEventListener('click',startSession);
  var savedStaff=localStorage.getItem('staff_name');
  if(savedStaff) document.getElementById('inp-staff').value=savedStaff;
  loadData();
};

function openModal(){
  var mode=session.mode;
  document.getElementById('modal-title').textContent=
    mode==='入庫'?'入庫 作業設定':
    mode==='出庫'?'出庫 作業設定':
    mode==='移動'?'移動 作業設定':'作業設定';
  document.getElementById('warehouse-label').textContent=mode==='移動'?'移動元倉庫':'倉庫';
  document.getElementById('dest-group').classList.toggle('hidden',mode!=='移動');
  document.getElementById('reason-group').classList.toggle('hidden',mode!=='出庫');
  var savedStaff=localStorage.getItem('staff_name');
  if(savedStaff) document.getElementById('inp-staff').value=savedStaff;
  document.getElementById('modal').classList.add('show');
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
}

function startSession(){
  var w=document.getElementById('sel-warehouse').value;
  var s=document.getElementById('inp-staff').value.trim();
  if(!s){alert('担当者名を入力してください');return;}
  if(session.mode==='移動'){
    var d=document.getElementById('sel-dest').value;
    if(w===d){alert('移動元と移動先が同じ倉庫です');return;}
    session.dest=d;
  }
  if(session.mode==='出庫'){
    session.reason=document.getElementById('sel-reason').value;
  }
  session.warehouse=w;
  session.staff=s;
  localStorage.setItem('staff_name',s);
  document.getElementById('session-bar').classList.remove('hidden');
  document.getElementById('sb-warehouse').textContent=w;
  document.getElementById('sb-staff').textContent=s;
  var destTag=document.getElementById('sb-dest');
  if(session.mode==='移動'){
    destTag.textContent='→ '+session.dest;
    destTag.classList.remove('hidden');
  }else{
    destTag.classList.add('hidden');
  }
  closeModal();
  sessionHistory=[];recordedSizes=[];screenStack=[];renderHistory();
  var colors={入庫:'#34a853',出庫:'#ea4335',移動:'#1a73e8'};
  var sub=document.getElementById('header-sub');
  sub.textContent=session.mode;
  sub.style.background=colors[session.mode]||'var(--primary)';
  sub.classList.remove('hidden');
  showScreen('operation');
}

function startOperation(mode){
  session.mode=mode;
  openModal();
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('screen-'+name).classList.add('active');
  var titles={home:'在庫管理',operation:'入出庫',category:'商品選択',product:'商品選択',size:'サイズ選択',qty:'数量入力',stock:'在庫確認',master:'商品マスタ'};
  document.getElementById('header-title').textContent=titles[name]||'';
  document.querySelectorAll('.bnav-item').forEach(function(i){i.classList.remove('active');});
  if(name==='home'){
    document.getElementById('nav-home').classList.add('active');
    document.getElementById('header-sub').classList.add('hidden');
    document.getElementById('back-btn').classList.add('hidden');
  }else{
    document.getElementById('back-btn').classList.remove('hidden');
  }
  if(name==='stock') document.getElementById('nav-stock').classList.add('active');
  if(name==='operation') document.getElementById('nav-op').classList.add('active');
  if(name==='master'){document.getElementById('nav-master').classList.add('active');loadMasterAll();}
  if(name==='category') renderCategories();
  if(name==='stock') renderStock();
  screenStack.push(name);
}

function goBack(){screenStack.pop();var prev=screenStack.pop()||'home';showScreen(prev);}
function startScan(){showToast('スキャン機能は実装中です');}

function renderCategories(){
  if(master.length===0){document.getElementById('category-list').innerHTML='<div class="loading">読み込み中...</div>';return;}
  var cats=[];
  master.forEach(function(p){if(cats.indexOf(p['カテゴリ'])===-1)cats.push(p['カテゴリ']);});
  cats.sort();
  document.getElementById('category-list').innerHTML=cats.map(function(c){
    return '<div class="list-item" onclick="selectCategory(\''+c+'\')"><div class="list-item-name">'+c+'</div><div class="list-item-arrow">›</div></div>';
  }).join('');
}

function selectCategory(cat){
  currentCategory=cat;
  document.getElementById('bc-category').textContent=cat;
  document.getElementById('bc-category2').textContent=cat;
  renderProducts(cat);showScreen('product');
}

function renderProducts(cat){
  var names=[];
  master.filter(function(p){return p['カテゴリ']===cat;}).forEach(function(p){if(names.indexOf(p['商品名'])===-1)names.push(p['商品名']);});
  document.getElementById('product-list').innerHTML=names.map(function(name){
    return '<div class="list-item" onclick="selectProduct(\''+name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')"><div class="list-item-name">'+name+'</div><div class="list-item-arrow">›</div></div>';
  }).join('');
}

function selectProduct(name){
  currentProductName=name;recordedSizes=[];
  document.getElementById('bc-product').textContent=name;
  renderSizes(currentCategory,name);showScreen('size');
}

function renderSizes(cat,name){
  var items=master.filter(function(p){return p['カテゴリ']===cat&&p['商品名']===name;});
  document.getElementById('size-list').innerHTML=items.map(function(item){
    var done=recordedSizes.indexOf(item['SKU_ID'])!==-1;
    return '<div class="list-item" onclick="selectSku(\''+item['SKU_ID']+'\',\''+item['商品名'].replace(/'/g,"\\'")+'\',\''+item['サイズ'].replace(/'/g,"\\'")+'\',\''+item['単位']+'\')"><div class="list-item-name">'+item['サイズ']+'</div>'+(done?'<span class="badge badge-done">記録済</span>':'<div class="list-item-arrow">›</div>')+'</div>';
  }).join('');
}

function selectSku(skuId,name,size,unit){
  currentProduct={skuId:skuId,name:name,size:size,unit:unit};currentQty='';
  document.getElementById('qty-display').textContent='0';
  document.getElementById('qty-unit').textContent=unit;
  var modeColor={入庫:'#34a853',出庫:'#ea4335',移動:'#1a73e8'};
  var modeBg={入庫:'rgba(52,168,83,.1)',出庫:'rgba(234,67,53,.1)',移動:'rgba(26,115,232,.1)'};
  var metaHtml='<span class="product-meta-item">'+session.warehouse+'</span>';
  if(session.mode==='移動') metaHtml+='<span class="product-meta-item" style="background:rgba(26,115,232,.1);color:#1a73e8">→ '+session.dest+'</span>';
  metaHtml+='<span class="product-meta-item">'+session.staff+'</span>';
  metaHtml+='<span class="product-meta-item" style="background:'+modeBg[session.mode]+';color:'+modeColor[session.mode]+'">'+session.mode+'</span>';
  document.getElementById('product-confirm').innerHTML=
    '<div class="product-name">'+name+' '+size+'</div>'+
    '<div class="product-sku">'+skuId+'</div>'+
    '<div class="product-meta">'+metaHtml+'</div>';
  var ml={入庫:'✓ 入庫を記録する',出庫:'✓ 出庫を記録する',移動:'✓ 移動を記録する'};
  var btn=document.getElementById('record-btn');
  btn.textContent=ml[session.mode]||'記録する';
  btn.style.background=modeColor[session.mode]||'var(--primary)';
  showScreen('qty');
}

function numInput(n){if(currentQty.length>=4)return;currentQty+=n;document.getElementById('qty-display').textContent=parseInt(currentQty)||0;}
function numDel(){currentQty=currentQty.slice(0,-1);document.getElementById('qty-display').textContent=currentQty?parseInt(currentQty):0;}

async function recordLog(){
  var qty=parseInt(currentQty)||0;
  if(qty===0){showToast('数量を入力してください');return;}
  var opMap={入庫:'入庫',出庫:session.reason||'出庫（使用）',移動:'移動（出）'};
  var sign=session.mode==='入庫'?1:-1;
  var payload={
    action:'addLog',
    操作種別:opMap[session.mode],
    SKU_ID:currentProduct.skuId,
    倉庫:session.warehouse,
    移動先倉庫:session.mode==='移動'?session.dest:'',
    数量変動:qty*sign,
    単位:currentProduct.unit,
    担当者:session.staff
  };
  var btn=document.getElementById('record-btn');
  btn.textContent='記録中...';
  try{
    await fetch(API,{method:'POST',body:JSON.stringify(payload)});
    sessionHistory.unshift({name:currentProduct.name+' '+currentProduct.size,qty:qty*sign,unit:currentProduct.unit,mode:session.mode,dest:session.dest});
    recordedSizes.push(currentProduct.skuId);
    showToast('✓ 記録しました');currentQty='';
    renderSizes(currentCategory,currentProductName);showScreen('size');renderHistory();
  }catch(e){
    showToast('記録に失敗しました');
    var ml={入庫:'✓ 入庫を記録する',出庫:'✓ 出庫を記録する',移動:'✓ 移動を記録する'};
    btn.textContent=ml[session.mode]||'記録する';
  }
}

function renderHistory(){
  var el=document.getElementById('history-list');
  if(sessionHistory.length===0){el.innerHTML='<div style="font-size:12px;color:var(--text3)">まだ記録がありません</div>';return;}
  el.innerHTML=sessionHistory.slice(0,5).map(function(h){
    var isMove=h.mode==='移動';
    var isIn=h.qty>0;
    var badgeClass=isMove?'move':isIn?'in':'out';
    var badgeText=isMove?'移動':isIn?'入庫':'出庫';
    var qtyClass=isMove?'move':isIn?'plus':'minus';
    return '<div class="history-item">'+
      '<span class="history-badge '+badgeClass+'">'+badgeText+'</span>'+
      '<div class="history-name">'+h.name+(isMove?' →'+h.dest:'')+'</div>'+
      '<div class="history-qty '+qtyClass+'">'+(isIn&&!isMove?'+':'')+h.qty+'</div>'+
      '<div style="font-size:11px;color:var(--text3);margin-left:2px">'+h.unit+'</div>'+
      '</div>';
  }).join('');
}

function updateHome(){
  document.getElementById('sum-sku').textContent=summary.length;
  var r=summary.filter(function(s){return s['ステータス']==='要補充';}).length;
  var o=summary.filter(function(s){return s['ステータス']==='欠品';}).length;
  document.getElementById('sum-reorder').textContent=r;
  document.getElementById('sum-out').textContent=o;
  var alerts=summary.filter(function(s){return s['ステータス']==='要補充'||s['ステータス']==='欠品';}).slice(0,5);
  if(alerts.length>0){
    document.getElementById('alert-area').innerHTML='<div class="alert-card"><div class="alert-title">⚠️ 補充が必要な商品 ('+alerts.length+'件)</div>'+alerts.map(function(a){return '<div class="alert-item">・'+a['商品名']+' '+a['サイズ']+' — '+a['ステータス']+'</div>';}).join('')+'</div>';
  }
}

var currentWarehouseFilter='all';
function filterWarehouse(w,btn){
  currentWarehouseFilter=w;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');renderStock();
}

function renderStock(){
  var el=document.getElementById('stock-list');
  if(summary.length===0){el.innerHTML='<div class="loading">読み込み中...</div>';return;}
  el.innerHTML=summary.map(function(item){
    var y=parseFloat(item['山科倉庫_在庫'])||0,s=parseFloat(item['創造社倉庫_在庫'])||0,o=parseFloat(item['事務所_在庫'])||0;
    var q=currentWarehouseFilter==='all'?y+s+o:currentWarehouseFilter==='山科倉庫'?y:currentWarehouseFilter==='創造社倉庫'?s:o;
    var st=item['ステータス']||'正常';
    var bc=st==='欠品'?'badge-ng':st==='要補充'?'badge-warn':'badge-ok';
    return '<div class="list-item" style="cursor:default"><div style="flex:1"><div class="list-item-name">'+(item['商品名']||'')+' '+(item['サイズ']||'')+'</div></div><div style="text-align:right"><div style="font-size:20px;font-weight:700">'+q+'</div><span class="badge '+bc+'">'+st+'</span></div></div>';
  }).join('');
}

function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

// ============================================================
// 商品マスタ管理
// ============================================================
const CATEGORIES=['AC100','ADDITIVE','PIGMENT','蛍光PIGMENT','AC200','AC730 BASE','AC730 Liquid','Flex Metal Base','Flex Metal Liquid','ガラス繊維','ガラスチョップ','離型剤','コーティング剤','フィラー','意匠フィラー','カヤメック','シリコン','その他造形資材','洗浄剤','ツール','容器','段ボール','ビニール袋','備品','エポキシ','IBC'];
let masterAll=[],toggleTarget=null;

async function loadMasterAll(){
  try{
    const res=await fetch(API+'?action=getMasterAll');
    const json=await res.json();
    masterAll=json.data||json;
    populateCategorySelects();
    renderMasterList();
  }catch(e){
    document.getElementById('master-list').innerHTML='<div style="text-align:center;padding:40px;color:var(--danger)">読み込み失敗</div>';
  }
}

function populateCategorySelects(){
  ['masterCatFilter','add-category'].forEach(function(id){
    var sel=document.getElementById(id);
    var isFilter=id==='masterCatFilter';
    sel.innerHTML=isFilter?'<option value="">全カテゴリ</option>':'<option value="">選択してください</option>';
    CATEGORIES.forEach(function(c){
      var opt=document.createElement('option');
      opt.value=c;opt.textContent=c;sel.appendChild(opt);
    });
  });
}

function renderMasterList(){
  var cat=document.getElementById('masterCatFilter').value;
  var kw=document.getElementById('masterSearch').value.trim().toLowerCase();
  var showInactive=document.getElementById('masterShowInactive').checked;
  var filtered=masterAll.filter(function(r){
    if(!showInactive&&!r['有効'])return false;
    if(cat&&r['カテゴリ']!==cat)return false;
    if(kw){
      var hay=(r['商品名']+r['サイズ']+r['SKU_ID']+(r['備考']||'')).toLowerCase();
      if(hay.indexOf(kw)===-1)return false;
    }
    return true;
  });
  document.getElementById('masterCount').textContent=filtered.length+'件';
  if(filtered.length===0){
    document.getElementById('master-list').innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">該当なし</div>';
    return;
  }
  var grouped={};
  filtered.forEach(function(r){
    var c=r['カテゴリ']||'未分類';
    if(!grouped[c])grouped[c]=[];
    grouped[c].push(r);
  });
  var html='';
  Object.keys(grouped).forEach(function(cat){
    html+='<div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.05em;margin:14px 0 6px;text-transform:uppercase">'+cat+'</div>';
    grouped[cat].forEach(function(r){
      var inactive=!r['有効'];
      var skuSafe=r['SKU_ID'].replace(/'/g,"\\'");
      var nameSafe=(r['商品名']||'').replace(/'/g,"\\'");
      var sizeSafe=(r['サイズ']||'').replace(/'/g,"\\'");
      html+='<div style="background:var(--surface);border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid '+(inactive?'#fde68a':'var(--border)')+';opacity:'+(inactive?'.65':'1')+';display:flex;align-items:center;gap:8px">'+
        '<div style="flex:1;min-width:0">'+
          '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'+
            '<span style="font-size:15px;font-weight:700;color:'+(inactive?'var(--text3)':'var(--text)')+'">'+r['商品名']+'</span>'+
            '<span style="font-size:13px;color:var(--text2)">'+r['サイズ']+'</span>'+
            (inactive?'<span class="badge" style="background:#fef3c7;color:#92400e">廃番</span>':'')+
          '</div>'+
          '<div style="font-size:11px;color:var(--text3);font-family:monospace;margin-top:2px">'+r['SKU_ID']+'</div>'+
          '<div style="font-size:11px;color:var(--text2);margin-top:2px">'+r['商品区分']+'／最低'+r['最低在庫数']+r['単位']+(r['備考']?'／'+r['備考']:'')+'</div>'+
        '</div>'+
        (inactive
          ?'<button onclick="openToggleMasterModal(\''+skuSafe+'\',\''+nameSafe+'\',\''+sizeSafe+'\',true)" style="font-size:12px;padding:6px 12px;border-radius:8px;border:1.5px solid var(--success);color:var(--success);background:#fff;cursor:pointer;white-space:nowrap">復元</button>'
          :'<button onclick="openToggleMasterModal(\''+skuSafe+'\',\''+nameSafe+'\',\''+sizeSafe+'\',false)" style="font-size:12px;padding:6px 12px;border-radius:8px;border:1.5px solid var(--danger);color:var(--danger);background:#fff;cursor:pointer;white-space:nowrap">廃番</button>'
        )+
      '</div>';
    });
  });
  document.getElementById('master-list').innerHTML=html;
}

function openAddMasterModal(){
  document.getElementById('addMasterModal').classList.add('show');
  updateSkuPreview();
}
function closeAddMasterModal(){
  document.getElementById('addMasterModal').classList.remove('show');
}
function updateSkuPreview(){
  var cat=document.getElementById('add-category').value;
  var name=document.getElementById('add-name').value;
  var size=document.getElementById('add-size').value;
  if(cat&&name&&size){
    document.getElementById('sku-preview').textContent=clientSkuId(cat,name,size);
  }else{
    document.getElementById('sku-preview').textContent='（カテゴリ・商品名・サイズを入力）';
  }
}
function clientSkuId(cat,name,size){
  function f(s){return String(s).toUpperCase().replace(/[・]/g,'-').replace(/[（]/g,'-').replace(/[）]/g,'').replace(/[　 ]/g,'-').replace(/[.]/g,'-').replace(/[,]/g,'').replace(/--+/g,'-').trim();}
  return f(cat)+'-'+f(name)+'-'+f(size);
}

async function submitAddMaster(){
  var cat=document.getElementById('add-category').value;
  var name=document.getElementById('add-name').value.trim();
  var size=document.getElementById('add-size').value.trim();
  var unit=document.getElementById('add-unit').value;
  var type=document.getElementById('add-type').value;
  var minstock=document.getElementById('add-minstock').value;
  var barcode=document.getElementById('add-barcode').value;
  var note=document.getElementById('add-note').value.trim();
  if(!cat||!name||!size){showToast('カテゴリ・商品名・サイズは必須です');return;}
  var btn=document.getElementById('add-master-btn');
  btn.disabled=true;btn.textContent='登録中...';
  try{
    const res=await fetch(API,{method:'POST',body:JSON.stringify({action:'addMaster',カテゴリ:cat,商品名:name,サイズ:size,単位:unit,商品区分:type,最低在庫数:minstock,バーコード種別:barcode,備考:note})});
    const json=await res.json();
    if(!json.success)throw new Error(json.message);
    showToast('✅ 登録しました：'+json.skuId);
    closeAddMasterModal();
    ['add-name','add-size','add-note'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('add-category').value='';
    await loadMasterAll();
    await loadData();
  }catch(e){
    showToast('❌ 登録失敗：'+e.message);
  }finally{
    btn.disabled=false;btn.textContent='登録する';
  }
}

function openToggleMasterModal(skuId,name,size,restore){
  toggleTarget={skuId:skuId,restore:restore};
  document.getElementById('toggle-title').textContent=restore?'復元の確認':'廃番にする確認';
  document.getElementById('toggle-body').textContent='「'+name+' '+size+'」を'+(restore?'復元（有効に戻す）':'廃番（無効化）')+'しますか？';
  var btn=document.getElementById('toggle-confirm-btn');
  btn.textContent=restore?'復元する':'廃番にする';
  btn.style.background=restore?'var(--success)':'var(--danger)';
  document.getElementById('toggleMasterModal').classList.add('show');
}
function closeToggleMasterModal(){
  document.getElementById('toggleMasterModal').classList.remove('show');
  toggleTarget=null;
}
async function confirmToggleMaster(){
  if(!toggleTarget)return;
  var btn=document.getElementById('toggle-confirm-btn');
  btn.disabled=true;
  try{
    const res=await fetch(API,{method:'POST',body:JSON.stringify({action:'toggleMaster',SKU_ID:toggleTarget.skuId,有効:toggleTarget.restore})});
    const json=await res.json();
    if(!json.success)throw new Error(json.message);
    showToast(toggleTarget.restore?'✅ 復元しました':'✅ 廃番にしました');
    closeToggleMasterModal();
    await loadMasterAll();
  }catch(e){
    showToast('❌ 失敗：'+e.message);
  }finally{
    btn.disabled=false;
  }
}
